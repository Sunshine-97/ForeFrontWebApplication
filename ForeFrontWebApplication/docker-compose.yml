version: '3.8'

services:
    postgres:
        image: postgres:16
        environment:
            POSTGRES_USER: orderuser
            POSTGRES_PASSWORD: secret
            POSTGRES_DB: orderdb
        ports:
            - "5432:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data
            - ../docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
volumes:
    pgdata:
